name: hygiene

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: hygiene-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + test (macos-15)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Keep in sync with `packageManager` in package.json.
          version: 11.1.1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # The browser test suite (part of `make check`) drives Playwright's WebKit
      # build (~100MB). Cache it on the macOS path (runner is macos-15) so it
      # downloads once instead of every push; `make check` reinstalls idempotently
      # on a miss. restore-keys lets an unrelated lockfile bump reuse the prior
      # browser when the resolved Playwright version is unchanged.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: make check
        run: make check
